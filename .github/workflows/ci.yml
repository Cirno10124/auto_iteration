name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('ci-requirements.txt', 'pytest.ini', '.coveragerc') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ci-requirements.txt

    - name: Lint
      run: flake8 . --max-line-length=140 --extend-ignore=E203

    - name: Enforce source layout
      run: python src/scripts/check_source_layout.py

    - name: Ensure tests use committed test config
      run: rm -f orchestrator_config.json

    - name: Test with coverage
      run: |
        pytest -q \
          --cov=. \
          --cov-config=.coveragerc \
          --cov-report=term-missing \
          --cov-report=xml:coverage.xml

    - name: Smoke check GPU health script (no-GPU)
      run: |
        python -m py_compile src/scripts/gpu_health_check.py
        python src/scripts/gpu_health_check.py --help

    - name: Setup Node (sign_tools)
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: sign_tools/package.json

    - name: Install sign_tools dependencies
      working-directory: sign_tools
      run: npm install --no-audit --no-fund

    - name: Frontend lint gate (sign_tools)
      working-directory: sign_tools
      run: npm run lint

    - name: Frontend test gate (sign_tools)
      working-directory: sign_tools
      run: npm run test

    - name: Frontend build gate (sign_tools)
      working-directory: sign_tools
      run: npm run build

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-xml
        path: coverage.xml
        if-no-files-found: ignore

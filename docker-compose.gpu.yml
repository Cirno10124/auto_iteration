version: "3.9"

services:
  orchestrator-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: auto-iteration:gpu
    container_name: orchestrator-gpu
    gpus: all
    shm_size: "16gb"
    environment:
      HF_HUB_TOKEN: ${HF_HUB_TOKEN:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./:/workspace/auto_iteration
    working_dir: /workspace/auto_iteration
    healthcheck:
      test: ["CMD", "python3", "scripts/gpu_health_check.py"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
    command: ["python3", "orchestrator.py", "--env", "prod"]
